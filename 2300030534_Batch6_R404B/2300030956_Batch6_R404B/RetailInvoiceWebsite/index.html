<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Retail Invoice</title><link rel="stylesheet" href="style.css"></head><body><h1>Retail Invoice with GST</h1><div class="grid"><div><label>Item</label><select id="item"><option value="Rice,100,5">Rice ₹100</option><option value="Oil,200,12">Oil ₹200</option><option value="Sugar,60,5">Sugar ₹60</option></select><label>Qty</label><input id="qty" type="number" value="1"><label>Discount %</label><input id="disc" type="number" value="0"><button onclick="add()">Add</button></div><div><table id="t"><tr><th>Item</th><th>Amt</th><th>Net</th></tr></table><p>Coupon <input id="coupon" value="0" type="number"></p><button onclick="bill()">Generate Invoice</button><pre id="out"></pre></div></div><script src="script.js"></script></body></html>
